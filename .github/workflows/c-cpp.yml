name: Build iOS Dylib (Theos Workflow)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء (Build Type)'
        required: true
        default: 'release'
        type: choice
        options:
        - release
        - debug

jobs:
  build:
    name: Build Dynamic Library (.dylib)
    runs-on: macos-14

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      # 1. جلب الكود المصدري للمشروع
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. تخزين Theos و SDKs مؤقتاً لتسريع البناء
      - name: 2. Cache Theos and SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.THEOS }}
            ${{ env.THEOS }}/sdks
          key: ${{ runner.os }}-theos-${{ hashFiles('**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-theos-

      # 3. إعداد Theos مع جميع الأدوات المطلوبة (مثل dm.pl)
      - name: 3. Setup Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/theos/theos.git $THEOS
          cd $THEOS
          git submodule update --init --recursive --depth 1

      # 4. تثبيت آخر إصدار حقيقي من ldid (من API مباشرة)
      - name: 4. Install latest ldid
        run: |
          mkdir -p $THEOS/bin

          echo "Fetching latest ldid release info..."
          # نجلب بيانات آخر إصدار وروابط التحميل
          RELEASE_JSON=$(curl -sfL https://api.github.com/repos/ProcursusTeam/ldid/releases/latest)
          
          if [ -z "$RELEASE_JSON" ]; then
            echo "❌ Failed to fetch release data from GitHub API"
            exit 1
          fi

          # استخراج جميع روابط التحميل التي تنتهي بـ "ldid_macos_" (أي معمارية)
          LDID_URLS=$(echo "$RELEASE_JSON" | grep -o '"browser_download_url": *"[^"]*ldid_macos_[^"]*"' | cut -d'"' -f4)

          if [ -z "$LDID_URLS" ]; then
            echo "❌ No macOS ldid binary found in the latest release"
            exit 1
          fi

          # تفضيل x86_64 إن وجدت، وإلا أخذ أول رابط (غالباً ARM لـ macos-14)
          LDID_URL=$(echo "$LDID_URLS" | grep 'x86_64' | head -1)
          if [ -z "$LDID_URL" ]; then
            LDID_URL=$(echo "$LDID_URLS" | head -1)
            echo "⚠️ x86_64 binary not found, falling back to: $LDID_URL"
          else
            echo "Found x86_64 binary: $LDID_URL"
          fi

          echo "Downloading ldid..."
          curl -fL -o $THEOS/bin/ldid "$LDID_URL"
          chmod +x $THEOS/bin/ldid

          # التحقق النهائي أنه ثنائي Mach-O حقيقي
          if file $THEOS/bin/ldid | grep -q 'Mach-O'; then
            echo "✅ ldid binary is valid"
          else
            echo "❌ Downloaded file is not a Mach-O binary!"
            cat $THEOS/bin/ldid  # طباعة المحتوى للتشخيص
            exit 1
          fi

          $THEOS/bin/ldid --version || true

      # 5. بناء المكتبة الديناميكية
      - name: 5. Build .dylib
        run: |
          export FINALPACKAGE=1
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            make package debug=1
          else
            make package
          fi

      # 6. رفع المخرجات كـ artifact
      - name: 6. Upload .dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-dylib
          path: packages/*.deb
