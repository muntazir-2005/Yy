name: Build iOS Dylib (Theos Workflow)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء (Build Type)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    name: Build Dynamic Library (.dylib)
    runs-on: macos-14

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      # 1. جلب الكود المصدري للمشروع
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. تسريع عملية البناء عن طريق تخزين Theos و SDKs مؤقتاً
      - name: 2. Cache Theos and SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.THEOS }}
          key: ${{ runner.os }}-theos-${{ hashFiles('.gitmodules') }}
          restore-keys: |
            ${{ runner.os }}-theos-

      # 3. تثبيت ldid فقط
      - name: 3. Install ldid
        run: |
          brew update
          brew install ldid
          which ldid
          ldid -v
