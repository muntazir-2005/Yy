name: Build iOS Dylib (Theos Workflow)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء (Build Type)'
        required: true
        default: 'release'
        type: choice
        options:
        - release
        - debug

jobs:
  build:
    name: Build Dynamic Library (.dylib)
    runs-on: macos-14

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      # 1. جلب الكود المصدري للمشروع
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. تخزين Theos و SDKs مؤقتاً لتسريع البناء
      - name: 2. Cache Theos and SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.THEOS }}
            ${{ env.THEOS }}/sdks
          key: ${{ runner.os }}-theos-${{ hashFiles('**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-theos-

      # 3. إعداد Theos مع جميع الأدوات المطلوبة (مثل dm.pl)
      - name: 3. Setup Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 https://github.com/theos/theos.git $THEOS
          cd $THEOS
          git submodule update --init --recursive --depth 1

      # 4. تثبيت آخر إصدار من ldid (ثنائي حقيقي وآمن)
      - name: 4. Install latest ldid
        run: |
          mkdir -p $THEOS/bin

          # جلب رابط التحميل من GitHub API
          LDID_URL=$(curl -sfL https://api.github.com/repos/ProcursusTeam/ldid/releases/latest | \
            grep -o '"browser_download_url": *"[^"]*ldid_macos_x86_64"' | cut -d'"' -f4)

          # استخدام رابط احتياطي في حال فشل الـ API
          if [ -z "$LDID_URL" ]; then
            echo "API failed, using fallback URL"
            LDID_URL="https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_macos_x86_64"
          fi

          echo "Downloading ldid from: $LDID_URL"
          curl -fL -o $THEOS/bin/ldid "$LDID_URL"
          chmod +x $THEOS/bin/ldid

          # التحقق من أن الملف ثنائي حقيقي وليس صفحة خطأ
          if file $THEOS/bin/ldid | grep -q 'Mach-O'; then
            echo "✅ ldid binary verified"
          else
            echo "❌ Error: Downloaded ldid is not a valid binary!"
            exit 1
          fi

          $THEOS/bin/ldid --version || true

      # 5. بناء المكتبة الديناميكية
      - name: 5. Build .dylib
        run: |
          export FINALPACKAGE=1
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            make package debug=1
          else
            make package
          fi

      # 6. رفع المخرجات كـ artifact
      - name: 6. Upload .dylib artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-dylib
          path: packages/*.deb
