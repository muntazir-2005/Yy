Name: Build iOS Dylib (Theos Workflow)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء (Build Type)'
        required: true
        default: 'release'
        type: choice
        options:
        - release
        - debug

jobs:
  build:
    name: Build Dynamic Library (.dylib)
    runs-on: macos-14

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      # 1. جلب الكود المصدري للمشروع
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # تثبيت أداة ldid لتوقيع الملف
      - name: Install ldid
        run: brew install ldid

      # 2. تسريع عملية البناء عن طريق تخزين Theos و SDKs مؤقتاً
      - name: 2. Cache Theos and SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/theos
            ${{ github.workspace }}/theos/sdks
          key: ${{ runner.os }}-theos-${{ hashFiles('**/Makefile') }}

      # 3. تحميل Theos عند عدم توفره في الكاش
      - name: Prepare Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: theos
          submodules: recursive

      # 4. تحميل iOS SDK عند عدم توفره في الكاش
      - name: Set up iOS SDK
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/theos/sdks.git ${{ github.workspace }}/theos/sdks

      # 5. بناء ملف dylib
      - name: Build Dylib
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            make
          else
            make FINALPACKAGE=1
          fi

      # 6. رفع ملف dylib الناتج
      - name: Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLibyanaPatch-Dylib
          path: .theos/obj/**/*.dylib
