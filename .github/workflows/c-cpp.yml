name: Build iOS Dylib (Theos Workflow)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء (Build Type)'
        required: true
        default: 'release'
        type: choice
        options:
        - release
        - debug

jobs:
  build:
    name: Build Dynamic Library (.dylib)
    runs-on: macos-14

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      # 1. جلب الكود المصدري للمشروع
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. تسريع عملية البناء عن طريق تخزين Theos و SDKs مؤقتاً
      - name: 2. Cache Theos and SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/theos
            ${{ github.workspace }}/theos/sdks
          key: ${{ runner.os }}-theos-v2-${{ hashFiles('**/Makefile') }}
          restore-keys: |
            ${{ runner.os }}-theos-v2-

      # 3. إعداد بيئة Theos
      - name: 3. Setup Theos Environment
        run: |
          if [ ! -d "$THEOS" ]; then
            echo "Cloning Theos repository..."
            git clone --recursive https://github.com/theos/theos.git "$THEOS"
          else
            echo "Theos already exists from cache."
          fi

      # 4. تحميل SDKs الخاصة بنظام iOS
      - name: 4. Download iOS SDKs
        run: |
          if [ ! -d "$THEOS/sdks/iPhoneOS16.5.sdk" ] && [ ! -d "$THEOS/sdks/iPhoneOS14.5.sdk" ]; then
            echo "Downloading iOS SDKs..."
            git clone --depth 1 https://github.com/theos/sdks.git /tmp/sdks
            mkdir -p "$THEOS/sdks"
            cp -r /tmp/sdks/*.sdk "$THEOS/sdks/" 2>/dev/null || true
            rm -rf /tmp/sdks
          else
            echo "SDKs already cached."
          fi

      # 5. بناء الملف المصدري وتجميعه (.dylib)
      - name: 5. Compile Dynamic Library (.dylib)
        run: |
          echo "Cleaning existing build files..."
          make clean
          
          echo "Starting compilation process..."
          if [ "${{ github.event.inputs.build_type }}" = "debug" ]; then
            make DEBUG=1
          else
            make FINALPACKAGE=1
          fi

      # 6. تنظيم واستخراج الملفات المجمّعة
      - name: 6. Organize Build Artifacts
        run: |
          mkdir -p output
          # نسخ ملفات dylib الناتجة
          find .theos/obj/ -name "*.dylib" -exec cp {} output/ \; 2>/dev/null || true
          # نسخ حزم deb في حال وجودها
          find packages/ -name "*.deb" -exec cp {} output/ \; 2>/dev/null || true
          
          echo "Output files ready:"
          ls -la output/

      # 7. رفع ملف .dylib النهائي كـ Artifact قابل للتحميل
      - name: 7. Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Dylib-Artifacts
          path: output/
          retention-days: 7
