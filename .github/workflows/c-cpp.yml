name: Build iOS Dylib (Theos Workflow)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء (Build Type)'
        required: true
        default: 'release'
        type: choice
        options:
        - release
        - debug

jobs:
  build:
    name: Build Dynamic Library (.dylib)
    runs-on: macos-14

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      # 1. جلب الكود المصدري للمشروع
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. تثبيت Theos
      - name: 2. Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -s https://api.github.com/repos/theos/theos/releases/latest \
          | grep "browser_download_url.*iphoneos-arm64.*tar.xz" \
          | cut -d '"' -f 4 \
          | xargs curl -L -o toolchain.tar.xz
          mkdir -p $THEOS/toolchain
          tar -xf toolchain.tar.xz -C $THEOS/toolchain --strip-components=1
          rm toolchain.tar.xz

      # 3. تثبيت ldid (آخر إصدار)
      - name: 3. Install ldid
        run: brew install ldid

      # 4. بناء المشروع
      - name: 4. Build Dylib
        run: make clean package
