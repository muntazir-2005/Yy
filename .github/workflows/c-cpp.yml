name: Build iOS Dylib (Theos Workflow)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء (Build Type)'
        required: true
        default: 'release'
        type: choice
        options:
        - release
        - debug

jobs:
  build:
    name: Build Dynamic Library (.dylib)
    runs-on: macos-14

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      # 1. جلب الكود المصدري للمشروع
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. تثبيت أداة ldid الضرورية لتوقيع ملف dylib (تجاوز خطأ ldid: command not found)
      - name: 2. Install ldid
        run: brew install ldid

      # 3. تسريع عملية البناء عن طريق تخزين Theos و SDKs مؤقتاً
      - name: 3. Cache Theos and SDKs
        id: cache-theos
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/theos
            ${{ github.workspace }}/theos/sdks
          key: ${{ runner.os }}-theos-jailed-v3-${{ hashFiles('**/Makefile') }}

      # 4. تحميل Theos (إذا لم يكن موجوداً في الكاش)
      - name: 4. Prepare Theos
        if: steps.cache-theos.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: theos
          submodules: recursive

      # 5. تحميل iOS SDK (إذا لم يكن موجوداً في الكاش)
      - name: 5. Set up iOS SDK
        if: steps.cache-theos.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/theos/sdks.git ${{ github.workspace }}/theos/sdks

      # 6. بناء ملف dylib بناءً على اختيار المستخدم (Release أو Debug)
      - name: 6. Build Dylib
        run: |
          if [ "${{ github.event.inputs.build_type }}" == "debug" ]; then
            make
          else
            make FINALPACKAGE=1
          fi

      # 7. رفع ملف dylib الناتج لتتمكن من تحميله
      - name: 7. Upload Dylib Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLibyanaPatch-${{ github.event.inputs.build_type || 'release' }}-Dylib
          path: .theos/obj/**/*.dylib
