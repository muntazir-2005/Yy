

name: Build iOS Dylib (Theos Workflow)

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      build_type:
        description: "نوع البناء (Build Type)"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    runs-on: macos-14
    name: Build Dynamic Library (.dylib)

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Theos
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.THEOS }}
          key: ${{ runner.os }}-theos-${{ hashFiles('.gitmodules') }}
          restore-keys: |
            ${{ runner.os }}-theos-

      - name: Install ldid (only)
        env:
          HOMEBREW_NO_REQUIRE_TAP_TRUST: "1"
        run: |
          brew update
          brew install ldid
          which ldid

      - name: Build (Theos)
        shell: bash
        run: |
          set -e
          echo "Build type: ${{ inputs.build_type || 'release' }}"
          if [[ "${{ inputs.build_type || 'release' }}" == "debug" ]]; then
            make clean
            make package
          else
            make clean
            make package FINALPACKAGE=1
          fi

      - name: Upload packages (.deb)
        uses: actions/upload-artifact@v4
        with:
          name: theos-packages
          path: |
            packages/*.deb
            .theos/obj/**/*.dylib
          if-no-files-found: warn
